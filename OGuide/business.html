<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place — ø̈Guide</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .business-header {
      padding: 28px 0 24px;
      border-bottom: 1px solid var(--border);
    }
    .business-header .tag { margin-bottom: 8px; }
    .business-header__name {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .business-header__meta {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .business-header__since {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .business-layout {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 40px;
      padding: 28px 0 60px;
      align-items: start;
    }
    @media (max-width: 800px) {
      .business-layout { grid-template-columns: 1fr; }
      .business-sidebar { order: -1; }
    }

    .business-section { margin-bottom: 36px; }
    .business-section h2 {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-light);
    }
    .business-description {
      font-size: 0.92rem;
      font-weight: 400;
      line-height: 1.8;
      color: var(--text);
    }
    .business-writeup {
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1.85;
      color: var(--text);
    }

    .business-sidebar { display: flex; flex-direction: column; gap: 16px; }

    .not-found { padding: 60px 24px; text-align: center; }
    .not-found h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; }
    .not-found p { font-weight: 400; color: var(--text-muted); margin-bottom: 20px; font-size: 0.85rem; }
  </style>
</head>
<body>

  <nav class="oguide-nav" id="main-nav">
    <a class="oguide-nav__logo" href="index.html">ø̈<span>Guide</span></a>
    <ul class="oguide-nav__links">
      <li><a href="listings.html?category=restaurant">Restaurants</a></li>
      <li><a href="listings.html?category=bar">Bars</a></li>
      <li><a href="listings.html?category=bookshop">Bookshops</a></li>
      <li><a href="listings.html">All</a></li>
    </ul>
    <button class="oguide-nav__hamburger" id="hamburger" aria-label="Open menu">&#9776;</button>
  </nav>
  <div class="oguide-nav__mobile-menu" id="mobile-menu">
    <a href="listings.html?category=restaurant">Restaurants</a>
    <a href="listings.html?category=bar">Bars</a>
    <a href="listings.html?category=bookshop">Bookshops</a>
    <a href="listings.html?category=cafe">Cafes</a>
    <a href="listings.html">All Places</a>
  </div>

  <div id="page-content"></div>

  <footer class="oguide-footer">
    <div class="oguide-footer__logo">ø̈<span>Guide</span></div>
    <p class="oguide-footer__note">Prototype -- Placeholder data only</p>
  </footer>

  <script src="data.js"></script>
  <script>
    // Nav
    window.addEventListener('scroll', () => {
      document.getElementById('main-nav')
        .classList.toggle('is-scrolled', window.scrollY > 10);
    });
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    hamburger.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('is-open');
      hamburger.textContent = open ? '\u2715' : '\u2630';
    });

    // Load business
    const id = parseInt(getParam('id'), 10);
    const business = OGuideData.businesses.find(b => b.id === id);
    const content = document.getElementById('page-content');

    if (!business) {
      content.innerHTML = `
        <div class="container not-found">
          <h1>Place not found</h1>
          <p>We couldn't find a place with that ID.</p>
          <a href="listings.html" class="btn">Browse all places</a>
        </div>`;
    } else {
      const city = OGuideData.cities.find(c => c.id === business.city);
      const cat = OGuideData.categories.find(c => c.id === business.category);
      document.title = `${business.name} — ø̈Guide`;

      content.innerHTML = `
        <div class="container">
          <header class="business-header">
            <nav class="breadcrumb">
              <a href="index.html">ø̈Guide</a> /
              <a href="listings.html?city=${business.city}">${city ? city.name : business.city}</a> /
              <a href="listings.html?category=${business.category}">${cat ? cat.label : business.category}</a> /
              <span>${business.name}</span>
            </nav>
            <span class="tag">${cat ? cat.label : business.category}</span>
            <h1 class="business-header__name">${business.name}</h1>
            <p class="business-header__meta">${city ? city.name : business.city} / ${business.neighborhood} / ${business.type}</p>
            ${business.since ? `<span class="business-header__since">Since ${business.since}</span>` : ''}
          </header>
        </div>

        <main class="container business-layout">
          <div class="business-main">
            <section class="business-section">
              <h2>About</h2>
              <p class="business-description">${business.description}</p>
            </section>
            ${business.writeup ? `
            <section class="business-section">
              <h2>Why It Matters</h2>
              <p class="business-writeup">${business.writeup}</p>
            </section>
            ` : ''}
          </div>

          <aside class="business-sidebar">
            <div class="info-card">
              <h3>Details</h3>
              <dl>
                <dt>Address</dt><dd>${business.address}</dd>
                <dt>Phone</dt><dd>${business.phone}</dd>
                <dt>Hours</dt><dd>${business.hours}</dd>
                <dt>Type</dt><dd>${business.type}</dd>
                <dt>Price</dt><dd>${business.priceRange}</dd>
                ${business.since ? `<dt>Est.</dt><dd>${business.since}</dd>` : ''}
              </dl>
            </div>
            <a href="listings.html?city=${business.city}" class="btn btn-outline" style="text-align:center;">
              &larr; More in ${city ? city.name : business.city}
            </a>
          </aside>
        </main>
      `;
    }
  </script>
</body>
</html>
