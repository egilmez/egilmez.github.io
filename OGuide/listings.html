<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — ø̈Guide</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .listings-header {
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .listings-header h1 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .listings-header__count {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .listings-layout {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 32px;
      padding: 28px 0 60px;
      align-items: start;
    }

    .listings-sidebar {
      position: sticky;
      top: calc(var(--nav-height) + 16px);
    }
    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
    }
    .sidebar-header h2 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .sidebar-clear {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
    }
    .sidebar-clear:hover { color: var(--text); }

    .filter-toggle-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 16px;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .listings-layout { grid-template-columns: 1fr; }
      .listings-sidebar { display: none; }
      .listings-sidebar.is-open { display: block; }
      .filter-toggle-btn { display: flex; }
    }
  </style>
</head>
<body>

  <nav class="oguide-nav" id="main-nav">
    <a class="oguide-nav__logo" href="index.html">ø̈<span>Guide</span></a>
    <ul class="oguide-nav__links">
      <li><a href="listings.html?category=restaurant">Restaurants</a></li>
      <li><a href="listings.html?category=bar">Bars</a></li>
      <li><a href="listings.html?category=bookshop">Bookshops</a></li>
      <li><a href="listings.html">All</a></li>
    </ul>
    <button class="oguide-nav__hamburger" id="hamburger" aria-label="Open menu">&#9776;</button>
  </nav>
  <div class="oguide-nav__mobile-menu" id="mobile-menu">
    <a href="listings.html?category=restaurant">Restaurants</a>
    <a href="listings.html?category=bar">Bars</a>
    <a href="listings.html?category=bookshop">Bookshops</a>
    <a href="listings.html?category=cafe">Cafes</a>
    <a href="listings.html">All Places</a>
  </div>

  <header class="listings-header">
    <div class="container">
      <nav class="breadcrumb">
        <a href="index.html">ø̈Guide</a> /
        <span id="breadcrumb-ctx">Browse</span>
      </nav>
      <h1 id="listings-title">All Places</h1>
      <p class="listings-header__count" id="listings-count">-- places</p>
    </div>
  </header>

  <main class="container listings-layout">

    <aside class="listings-sidebar" id="listings-sidebar">
      <div class="sidebar-header">
        <h2>Filter</h2>
        <span class="sidebar-clear" id="clear-filters">Clear</span>
      </div>

      <div class="filter-group">
        <div class="filter-group__label">City</div>
        <div id="filter-city"></div>
      </div>

      <div class="filter-group">
        <div class="filter-group__label">Category</div>
        <div id="filter-category"></div>
      </div>

      <div class="filter-group">
        <div class="filter-group__label">Price</div>
        <div class="price-toggle" id="filter-price">
          <button class="price-btn" data-price="$">$</button>
          <button class="price-btn" data-price="$$">$$</button>
          <button class="price-btn" data-price="$$$">$$$</button>
          <button class="price-btn" data-price="$$$$">$$$$</button>
        </div>
      </div>
    </aside>

    <div class="listings-results">
      <button class="filter-toggle-btn" id="filter-toggle">&#9776; Filters</button>

      <div class="sort-bar">
        <span class="sort-bar__label">Sort</span>
        <button class="sort-btn is-active" data-sort="oldest">Oldest</button>
        <button class="sort-btn" data-sort="name">Name</button>
        <button class="sort-btn" data-sort="price-asc">Price &#8593;</button>
        <button class="sort-btn" data-sort="price-desc">Price &#8595;</button>
      </div>

      <div id="results-label" style="font-size:0.7rem;font-weight:300;color:var(--text-muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;"></div>

      <div class="card-grid" id="listings-grid"></div>
    </div>

  </main>

  <footer class="oguide-footer">
    <div class="oguide-footer__logo">ø̈<span>Guide</span></div>
    <p class="oguide-footer__note">Prototype -- Placeholder data only</p>
  </footer>

  <script src="data.js"></script>
  <script>
    let state = {
      q:         getParam('q'),
      city:      getParam('city'),
      category:  getParam('category'),
      prices:    new Set(),
      sort:      'oldest'
    };

    // Nav
    window.addEventListener('scroll', () => {
      document.getElementById('main-nav')
        .classList.toggle('is-scrolled', window.scrollY > 10);
    });
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    hamburger.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('is-open');
      hamburger.textContent = open ? '\u2715' : '\u2630';
    });

    // Active nav link
    document.querySelectorAll('.oguide-nav__links a').forEach(a => {
      if (a.href === location.href) a.classList.add('is-active');
    });

    // Filter toggle (mobile)
    document.getElementById('filter-toggle').addEventListener('click', () => {
      document.getElementById('listings-sidebar').classList.toggle('is-open');
    });

    // City filter
    const cityWrap = document.getElementById('filter-city');
    [{ id: '', name: 'All' }, ...OGuideData.cities].forEach(city => {
      cityWrap.insertAdjacentHTML('beforeend', `
        <label class="filter-option">
          <input type="radio" name="city" value="${city.id}" ${state.city === city.id ? 'checked' : ''}>
          <span>${city.name}</span>
        </label>
      `);
    });
    cityWrap.addEventListener('change', e => { state.city = e.target.value; pushState(); render(); });

    // Category filter
    const catWrap = document.getElementById('filter-category');
    [{ id: '', label: 'All' }, ...OGuideData.categories].forEach(cat => {
      catWrap.insertAdjacentHTML('beforeend', `
        <label class="filter-option">
          <input type="radio" name="category" value="${cat.id}" ${state.category === cat.id ? 'checked' : ''}>
          <span>${cat.label}</span>
        </label>
      `);
    });
    catWrap.addEventListener('change', e => { state.category = e.target.value; pushState(); render(); });

    // Price
    document.getElementById('filter-price').addEventListener('click', e => {
      const btn = e.target.closest('.price-btn');
      if (!btn) return;
      const p = btn.dataset.price;
      if (state.prices.has(p)) { state.prices.delete(p); btn.classList.remove('is-active'); }
      else { state.prices.add(p); btn.classList.add('is-active'); }
      render();
    });

    // Sort
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        state.sort = btn.dataset.sort;
        render();
      });
    });

    // Clear
    document.getElementById('clear-filters').addEventListener('click', () => {
      state.q = ''; state.city = ''; state.category = '';
      state.prices.clear();
      document.querySelectorAll('input[name=city]')[0].checked = true;
      document.querySelectorAll('input[name=category]')[0].checked = true;
      document.querySelectorAll('.price-btn').forEach(b => b.classList.remove('is-active'));
      pushState(); render();
    });

    // Filter & sort
    function getFiltered() {
      return OGuideData.businesses.filter(b => {
        if (state.city && b.city !== state.city) return false;
        if (state.category && b.category !== state.category) return false;
        if (state.prices.size && !state.prices.has(b.priceRange)) return false;
        if (state.q) {
          const q = state.q.toLowerCase();
          if (!b.name.toLowerCase().includes(q) &&
              !b.city.toLowerCase().includes(q) &&
              !(b.type || '').toLowerCase().includes(q) &&
              !b.neighborhood.toLowerCase().includes(q)) return false;
        }
        return true;
      });
    }

    const priceOrder = { '$': 1, '$$': 2, '$$$': 3, '$$$$': 4 };
    function getSorted(list) {
      return [...list].sort((a, b) => {
        if (state.sort === 'oldest')     return (a.since || 9999) - (b.since || 9999);
        if (state.sort === 'name')       return a.name.localeCompare(b.name);
        if (state.sort === 'price-asc')  return priceOrder[a.priceRange] - priceOrder[b.priceRange];
        if (state.sort === 'price-desc') return priceOrder[b.priceRange] - priceOrder[a.priceRange];
        return 0;
      });
    }

    function render() {
      const filtered = getSorted(getFiltered());
      const grid = document.getElementById('listings-grid');
      updateHeader(filtered.length);

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><strong>No places found</strong>Try adjusting your filters.</div>`;
        return;
      }

      grid.innerHTML = filtered.map(b => renderBusinessCard(b)).join('');
      document.getElementById('results-label').textContent =
        `${filtered.length} place${filtered.length !== 1 ? 's' : ''}`;
    }

    function updateHeader(count) {
      let title = 'All Places';
      let crumb = 'Browse';
      const city = OGuideData.cities.find(c => c.id === state.city);
      const cat = OGuideData.categories.find(c => c.id === state.category);
      if (cat && city) { title = `${cat.label} in ${city.name}`; crumb = `${city.name} / ${cat.label}`; }
      else if (cat) { title = cat.label; crumb = cat.label; }
      else if (city) { title = `Places in ${city.name}`; crumb = city.name; }
      else if (state.q) { title = `Search: "${state.q}"`; crumb = 'Search'; }
      document.getElementById('listings-title').textContent = title;
      document.getElementById('breadcrumb-ctx').textContent = crumb;
      document.getElementById('listings-count').textContent = `${count} place${count !== 1 ? 's' : ''}`;
      document.title = `${title} — ø̈Guide`;
    }

    function pushState() {
      const p = new URLSearchParams();
      if (state.q) p.set('q', state.q);
      if (state.city) p.set('city', state.city);
      if (state.category) p.set('category', state.category);
      history.replaceState(null, '', `?${p.toString()}`);
    }

    render();
  </script>
</body>
</html>
